<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM Login</title>
    <link rel="stylesheet" href="login.css?v=4" />
  </head>

  <body>
    <div class="auth-shell">
      <!-- LEFT PANEL -->
      <section class="brand-panel">
        <div class="brand-content">
          <img class="brand-logo" src="assests/logo.png" alt="ICSS CRM Logo" />
          <div class="brand-subtitle">Customer Relationship Management</div>
          <p class="brand-copy">
            Lorem Ipsum is simply dummy text of the printing and typesetting
            industry.
          </p>
          <a class="brand-login" href="register.html">Register</a>
          <div class="brand-note">New here?</div>
        </div>
      </section>

      <!-- RIGHT PANEL -->
      <section class="form-panel">
        <h2>Sign In to C.R.M</h2>
        <p class="form-note">Enter your email and password.</p>

        <form id="loginForm" class="register-form" action="login.php" method="post" autocomplete="off" novalidate>
          <label class="field">
            <span>Email</span>
            <input type="email" name="email" placeholder="Enter your email" required />
            <small class="error-text" data-error-for="email"></small>
          </label>

          <label class="field">
            <span>Password</span>
            <input type="password" name="password" placeholder="Enter your password" required />
            <small class="error-text" data-error-for="password"></small>
          </label>

          <a href="forgot_password.php" class="forgot-link">Forgot password?</a>

          <button class="primary-btn" type="submit">Login</button>

        </form>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="login.js?v=2"></script>
  </body>
</html>
