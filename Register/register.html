<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM Register</title>
    <link rel="stylesheet" href="register.css" />
  </head>

  <body>
    <div class="auth-shell">
      <!-- LEFT PANEL -->
      <section class="brand-panel">
        <div class="brand-content">
          <div class="brand-mark">C.R.M</div>
          <div class="brand-subtitle">Customer Relationship Management</div>
          <p class="brand-copy">
            Lorem Ipsum is simply dummy text of the printing and typesetting
            industry.
          </p>
          <a class="brand-login" href="login.html">Login</a>
          <div class="brand-note">Already registered?</div>
        </div>
      </section>

      <!-- RIGHT PANEL -->
      <section class="form-panel">
        <h2>Sign Up to C.R.M</h2>
        <p class="form-note">Create your account.</p>

        <form class="register-form">
          <label class="field">
            <span>Full Name</span>
            <input type="text" placeholder="Enter your full name" />
          </label>

          <label class="field">
            <span>Email</span>
            <input type="email" placeholder="Enter your email" />
          </label>

          <label class="field">
            <span>Phone</span>
            <input type="text" placeholder="Enter your phone number" />
          </label>

          <label class="field">
            <span>Password</span>
            <input type="password" placeholder="Create a password" />
          </label>

          <label class="field">
            <span>Confirm Password</span>
            <input type="password" placeholder="Re-enter your password" />
          </label>

          <button class="primary-btn">Register</button>
          <button class="ghost-btn">Back to Login</button>
        </form>
      </section>
    </div>
  </body>
</html>
