<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM Register</title>
    <link rel="stylesheet" href="register.css" />
  </head>

  <body>
    <div class="auth-shell">
      <!-- LEFT PANEL -->
      <section class="brand-panel">
        <div class="brand-content">
          <div class="brand-mark">C.R.M</div>
          <div class="brand-subtitle">Customer Relationship Management</div>
          <p class="brand-copy">
            Lorem Ipsum is simply dummy text of the printing and typesetting
            industry.
          </p>
          <a class="brand-login" href="login.html">Login</a>
          <div class="brand-note">Already registered?</div>
        </div>
      </section>

      <!-- RIGHT PANEL -->
      <section class="form-panel">
        <h2>Sign Up to C.R.M</h2>
        <p class="form-note">Create your account.</p>

        <form id="registerForm" class="register-form" action="register.php" method="post" autocomplete="off">
          <label class="field">
            <span>Full Name</span>
            <input type="text" name="full_name" placeholder="Enter your full name" required />
          </label>

          <label class="field">
            <span>Email</span>
            <input type="email" name="email" placeholder="Enter your email" required />
          </label>

          <label class="field">
            <span>Phone</span>
            <input type="tel" name="phone" placeholder="Enter your phone number" />
          </label>

          <label class="field">
            <span>Password</span>
            <input type="password" name="password" placeholder="Create a password" required />
          </label>

          <label class="field">
            <span>Confirm Password</span>
            <input type="password" name="confirm_password" placeholder="Re-enter your password" required />
          </label>

          <button class="primary-btn" type="submit">Register</button>
          <a class="ghost-btn" href="login.html">Back to Login</a>
        </form>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="register.js"></script>
  </body>
</html>
